service: auth-server

plugins:
  - serverless-plugin-typescript

provider:
  name: aws
  runtime: nodejs18.x
  region: eu-central-1
  timeout: 30
  environment:
    CLIENT_ID: ${file(config.json):CLIENT_ID}
    CLIENT_SECRET: ${file(config.json):CLIENT_SECRET}
    CALENDAR_ID: ${file(config.json):CALENDAR_ID}
    PUBLIC_CALENDAR_ID: ${file(config.json):PUBLIC_CALENDAR_ID}
    SERVICE_ACCOUNT_EMAIL: ${file(config.json):SERVICE_ACCOUNT_EMAIL}
    SERVICE_ACCOUNT_PRIVATE_KEY: ${file(config.json):SERVICE_ACCOUNT_PRIVATE_KEY}

functions:
  getAuthURL:
    handler: handler.getAuthURL
    events:
      - http:
          path: api/get-auth-url
          method: get
  getAccessToken:
    handler: handler.getAccessToken
    events:
      - http:
          path: api/token/{code}
          method: get
  getCalendarEvents:
    handler: handler.getCalendarEvents
    events:
      - http:
          path: api/get-events/{access_token}
          method: get
  getPublicEvents:
    handler: handler.getPublicEvents
    events:
      - http:
          path: api/get-public-events
          method: get
